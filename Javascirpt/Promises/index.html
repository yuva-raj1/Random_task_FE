<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Promises</h3>
    <script>
let promise1 = ()=> { return new Promise((resolve, reject) => {
    console.log("Promise 1");
    setTimeout(() => {
        resolve("success 1")
    }, 3000);
}) }
let promise2 =()=> { return new Promise((resolve, reject) => {
    console.log("Promise 2");
    setTimeout(() => {
        resolve("success 2")
    }, 1500);
}) }
let promise3 = ()=>{return  new Promise((resolve, reject) => {
    console.log("Promise 3");
    setTimeout(() => {
        resolve("success 3")
    }, 1000);
}) }
    promise1().then(res => {
        console.log(res)
        return promise2()
    })  .then(res => {
        console.log(res)
        return promise3()
    }).then(res => {
        console.log(res)
    })

    </script>
</body>
</html>
