<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>need to add data through post all approach</h3>
    <script>
        fetch("http://localhost:3000/data",{"method":"GET"})
        .then(data=>data.json())
        .then(content=>
        {
            for(i=0;i<content.length;i++){
                fetch(`http://localhost:3000/data/${content[i].id}`,{"method":"DELETE"})
                .then(r=>{
                    if(r.ok)
                        console.log("Deletion done: ",r.status,r.statusText);
                    else    
                        console.log("No deletion seen");
                    }).catch(err=>console.log(err))
            }
        })
    </script>
</body>
</html>
