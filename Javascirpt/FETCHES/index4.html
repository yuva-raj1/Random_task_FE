<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Fetches</h3>
    <script>
        const RefLink="https://pokeapi.co/api/v2/pokemon/ditto"
        fetch(RefLink)
        .then( valid => {return valid.json()} )
        .then(result=>{
            console.log(result);
            for(i=0;i<result.held_items.length;i++){
            for(j=0;j<result.held_items[i].version_details.length;j++){
                console.log(result.held_items[i].version_details[j].version.name)
            }
        }   
        } )
    </script>
</body>
</html>
