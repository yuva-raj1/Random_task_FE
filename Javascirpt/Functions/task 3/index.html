<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Functions</h2>
    <script>
        function greet(name){
            return `Hello ${name}`;
        }
        console.log(greet("avinaash"))
        console.log(greet("raj"))
        


    function sum(a,b){
        return a+b;
    }
    console.log(sum(12.5,12))
    console.log(sum(0.5,12))
    console.log(sum(1.5,12))


    function squarenum(num){
        return num*num;
    }
    console.log(squarenum(5.7))
    console.log(squarenum(7.0))
    console.log(squarenum(5))


    function average_array(arr){
        var sum=0,avg=0;
       for(i=0;i<arr.length;i++){
            sum+=arr[i]
       } 
       avg=sum/arr.length;
       return avg;
    }
    console.log(average_array([2,5,2]))
    console.log(average_array([2,6,2]))
    console.log(average_array([4,5,2]))


    function Vowel(str){
        for(i=0;i<str.length;i++){
            if(str[i]==='a'||str[i]==='e'||str[i]==='i'||str[i]==='o'||str[i]==='u'||str[i]==='A'||str[i]==='E'||str[i]==='I'||str[i]==='O'||str[i]==='U')
                return "it contains vowel letters";
        }
        return "No vowel letter";
    }
    console.log("yuva:", Vowel("yuva"));
    console.log("sry:",Vowel("sry"))

    function convertTemp(temp,scale){
        if(scale=='C'){
            return ((temp-32)*(5/9))
        }
        if(scale=='F')
            return ((temp*(9/5))+32)
    }
    console.log(convertTemp(37,'F'))
    </script>
</body>
</html>
