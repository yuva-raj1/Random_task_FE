    <h3>Call back functions</h3>
    <script>
        function processNum(num,callback){
            num+=num;
            callback(num);
        }
        function b(w){
            console.log("second"+w*10);
        }
        processNum(10,b)
    </script>
    <script>
        function forEachElement(a,callback){
            for(var i=0;i<a.length;i++){
                  <!-- var ele=a[i]; -->
                callback(a[i],i)
            }
        }
        function sent(e,i){
              console.log(i+" element :"+e)
        }
        forEachElement([1,2,3,4,5],sent)
    </script>
